upstream tbn_ims_api {
    server tbn-ims-api:8000;
}
upstream tbn_ims_web {
    server tbn-ims-web:3000;
}

# HTTP -> HTTPS リダイレクト
server {
    listen 80;
    server_name www.mszapps.com mszapps.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://www.mszapps.com$request_uri;
    }
}

# www 以外は www へリダイレクト
server {
    listen 443 ssl;
    http2 on;
    server_name mszapps.com;
    ssl_certificate     /etc/letsencrypt/live/www.mszapps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.mszapps.com/privkey.pem;
    return 301 https://www.mszapps.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.mszapps.com;

    ssl_certificate     /etc/letsencrypt/live/www.mszapps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.mszapps.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # FastAPI
    location /api/ {
        proxy_pass         http://tbn_ims_api;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Next.js
    location / {
        proxy_pass         http://tbn_ims_web;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
