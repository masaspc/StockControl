services:
  proxy:
    image: nginx:1.26-alpine
    container_name: tbn-ims-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
      - api
    networks:
      - tbn-ims-net

  web:
    container_name: tbn-ims-web
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://www.mszapps.com/api/v1}
      - NODE_ENV=${APP_ENV:-production}
    depends_on:
      - api
    networks:
      - tbn-ims-net

  api:
    container_name: tbn-ims-api
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tbn-ims-net

  db:
    image: postgres:16-alpine
    container_name: tbn-ims-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tbn-ims-net

volumes:
  postgres_data:

networks:
  tbn-ims-net:
    driver: bridge
